name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    name: Backend lint, typecheck, tests, migration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rigstory_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rigstory_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/rigstory_ci
      OLLAMA_BASE_URL: http://localhost:11434
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff format
        working-directory: backend
        run: ruff format --check .
      - name: Ruff lint
        working-directory: backend
        run: ruff check .
      - name: Mypy
        working-directory: backend
        run: mypy app tests
      - name: Pytest
        working-directory: backend
        run: pytest
      - name: Alembic migration
        working-directory: backend
        run: alembic upgrade head

  frontend:
    name: Frontend lint, typecheck, unit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend for OpenAPI export
        working-directory: backend
        run: python -m pip install -e .
      - name: Generate OpenAPI client
        working-directory: frontend
        run: npm run generate:client
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests
        working-directory: frontend
        run: npm run test
      - name: Build
        working-directory: frontend
        run: npm run build

  playwright:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Smoke test
        working-directory: frontend
        run: npm run e2e

  project-schema:
    name: Project sample schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend domain package
        working-directory: backend
        run: python -m pip install -e .
      - name: Validate samples
        run: python scripts/validate_project_samples.py

  dependency-license-report:
    name: Dependency license reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend license report
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          pip-licenses --format=json --output-file backend-license-report.json
      - name: Frontend license report
        working-directory: frontend
        run: |
          npm ci
          npm run license:report
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-license-reports
          path: |
            backend/backend-license-report.json
            frontend/frontend-license-report.json
