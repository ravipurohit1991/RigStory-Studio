name: Bug report
description: Report a reproducible RigStory Studio defect.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include sample project, command, or UI path when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: phase
    attributes:
      label: Plan Phase
      placeholder: "Release hardening"
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, test output, validation report, or project fixture.
